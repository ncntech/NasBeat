name: "🔭 NasTech Features Bot"
on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:
permissions:
  issues: write
  contents: read
jobs:
  feature-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Summarize recent NasBeat commits
        id: diff
        run: |
          git log --oneline --no-merges -30 2>/dev/null > /tmp/recent_commits.txt || true
          COUNT=$(wc -l < /tmp/recent_commits.txt | tr -d ' ')
          echo "count=$COUNT" >> $GITHUB_OUTPUT
      - name: Report recent activity
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const commits = fs.existsSync("/tmp/recent_commits.txt") ? fs.readFileSync("/tmp/recent_commits.txt","utf8").trim() : "";
            if (!commits) { console.log("No recent commits."); return; }
            const count = "${{ steps.diff.outputs.count }}";
            const title = `🔭 [NasTech Bot] NasBeat — ${count} recent commit(s)`;
            const body = `## Recent NasBeat Activity\n\n**${count} commits** in the last tracked window\n\n### Commits\n\`\`\`\n${commits}\n\`\`\`\n\n---\n*NasTech Features Bot — weekly*`;
            const open = await github.rest.issues.listForRepo({owner:context.repo.owner,repo:context.repo.repo,labels:"nastech-bot,upstream-diff",state:"open"});
            if (open.data.length>0) {
              await github.rest.issues.update({owner:context.repo.owner,repo:context.repo.repo,issue_number:open.data[0].number,title,body});
            } else {
              await github.rest.issues.create({owner:context.repo.owner,repo:context.repo.repo,title,body,labels:["nastech-bot","upstream-diff"]});
            }
