name: Automerge Controller (Dependabot safe merges)

on:
  pull_request_target:
    types: [opened, labeled, ready_for_review]

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Auto-merge Dependabot/format PRs when checks pass
        uses: pascalgn/automerge-action@v0.14.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          merge_method: squash
          approve: false
          pull_request_filter: 'author:app/dependabot OR title:Format'
