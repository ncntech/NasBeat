name: "Build & Release"

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Mark as pre-release?"
        type: boolean
        default: true
      release_notes:
        description: "Extra notes to prepend (optional — auto-generated from git log if empty)"
        type: string
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ══════════════════════════════════════════════════════════════════
  # JOB 1 — WINDOWS & ANDROID  (windows-latest)
  # ══════════════════════════════════════════════════════════════════
  build-windows-android:
    name: "🪟 Windows & 🤖 Android"
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "oracle"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.4"
          channel: "stable"

      - name: Install Dart/Flutter dependencies
        run: flutter pub get

      - name: Extract version from pubspec.yaml
        id: version
        shell: powershell
        run: |
          $vLine = Select-String -Path pubspec.yaml -Pattern '^version:\s*(\S+)' | Select-Object -First 1
          if (-not $vLine) { Write-Error "version not found in pubspec.yaml"; exit 1 }
          $ver = $vLine.Matches[0].Groups[1].Value.Split('+')[0]
          echo "VERSION=$ver" >> $env:GITHUB_ENV
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Decode Android keystore
        run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.KEY_STORE }}")
          [IO.File]::WriteAllBytes("./android/bloomee.jks", $bytes)

      - name: Write key.properties
        run: |
          echo keyPassword=${{ secrets.KEY_PASSWORD }}   > ./android/key.properties
          echo storePassword=${{ secrets.STORE_PASSWORD }} >> ./android/key.properties
          echo keyAlias=${{ secrets.KEY_ALIAS }}          >> ./android/key.properties

      - name: Build Android APKs (split-per-abi)
        run: flutter build apk --release --split-per-abi --build-number ${{ github.run_number }}

      - name: Verify APK signatures
        run: |
          $bt = Get-ChildItem "$env:ANDROID_HOME\build-tools" | Where-Object PSIsContainer | Sort-Object Name -Descending | Select-Object -First 1
          Write-Host "Build tools: $($bt.Name)"
          & "$($bt.FullName)\apksigner.bat" verify build/app/outputs/flutter-apk/app-release.apk
          & "$($bt.FullName)\apksigner.bat" verify build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          & "$($bt.FullName)\apksigner.bat" verify build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          & "$($bt.FullName)\apksigner.bat" verify build/app/outputs/flutter-apk/app-x86_64-release.apk

      - name: Rename APKs
        shell: powershell
        run: |
          $v = "$env:VERSION+${{ github.run_number }}"
          Rename-Item "build/app/outputs/flutter-apk/app-release.apk"             "nasbeat_android_v${v}_universal.apk"
          Rename-Item "build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk" "nasbeat_android_v${v}_armeabi-v7a.apk"
          Rename-Item "build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"   "nasbeat_android_v${v}_arm64-v8a.apk"
          Rename-Item "build/app/outputs/flutter-apk/app-x86_64-release.apk"      "nasbeat_android_v${v}_x86_64.apk"

      - name: Build Windows
        run: flutter build windows --release --build-number ${{ github.run_number }}

      - name: ZIP Windows build
        run: |
          $v = "$env:VERSION+${{ github.run_number }}"
          Compress-Archive -Path build/windows/x64/runner/Release/* `
            -Destination build/windows/x64/nasbeat_windows_x64_v${v}.zip

      - name: Upload Windows & Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Release-Windows-Android
          path: |
            build/app/outputs/flutter-apk/nasbeat_android_v${{ env.VERSION }}+${{ github.run_number }}_*.apk
            build/windows/x64/nasbeat_windows_x64_v${{ env.VERSION }}+${{ github.run_number }}.zip

      - name: Publish to GitHub Release (draft body — overwritten by bot later)
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ env.VERSION }}+${{ github.run_number }}
          token: ${{ secrets.GH_TOKEN }}
          prerelease: ${{ inputs.prerelease }}
          allowUpdates: true
          omitBodyDuringUpdate: true
          artifacts: |
            build/app/outputs/flutter-apk/nasbeat_android_v${{ env.VERSION }}+${{ github.run_number }}_universal.apk
            build/app/outputs/flutter-apk/nasbeat_android_v${{ env.VERSION }}+${{ github.run_number }}_armeabi-v7a.apk
            build/app/outputs/flutter-apk/nasbeat_android_v${{ env.VERSION }}+${{ github.run_number }}_arm64-v8a.apk
            build/app/outputs/flutter-apk/nasbeat_android_v${{ env.VERSION }}+${{ github.run_number }}_x86_64.apk
            build/windows/x64/nasbeat_windows_x64_v${{ env.VERSION }}+${{ github.run_number }}.zip


  # ══════════════════════════════════════════════════════════════════
  # JOB 2 — LINUX  (ubuntu-latest)
  # ══════════════════════════════════════════════════════════════════
  build-linux:
    name: "🐧 Linux"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.4"
          channel: "stable"

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake git ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Install Dart/Flutter dependencies
        run: flutter pub get

      - name: Extract version from pubspec.yaml
        run: |
          VERSION=$(grep -E '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Linux
        run: flutter build linux --release --build-number ${{ github.run_number }}

      - name: Package as .tar.gz
        run: |
          tar -czf nasbeat_linux_x64_v${{ env.VERSION }}+${{ github.run_number }}.tar.gz \
            -C build/linux/x64/release/bundle .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Release-Linux
          path: nasbeat_linux_x64_v${{ env.VERSION }}+${{ github.run_number }}.tar.gz

      - name: Publish to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: nasbeat_linux_x64_v${{ env.VERSION }}+${{ github.run_number }}.tar.gz
          tag: v${{ env.VERSION }}+${{ github.run_number }}
          token: ${{ secrets.GH_TOKEN }}
          prerelease: ${{ inputs.prerelease }}
          allowUpdates: true
          omitBodyDuringUpdate: true


  # ══════════════════════════════════════════════════════════════════
  # JOB 3 — macOS  (macos-latest)
  # ══════════════════════════════════════════════════════════════════
  build-macos:
    name: "🍎 macOS"
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.4"
          channel: "stable"

      - name: Install Dart/Flutter dependencies
        run: flutter pub get

      - name: Extract version from pubspec.yaml
        run: |
          VERSION=$(grep -E '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build macOS
        run: flutter build macos --release --build-number ${{ github.run_number }}

      - name: ZIP NasBeat.app
        run: |
          cd build/macos/Build/Products/Release
          zip -r "$OLDPWD/nasbeat_macos_universal_v${{ env.VERSION }}+${{ github.run_number }}.zip" NasBeat.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Release-macOS
          path: nasbeat_macos_universal_v${{ env.VERSION }}+${{ github.run_number }}.zip

      - name: Publish to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: nasbeat_macos_universal_v${{ env.VERSION }}+${{ github.run_number }}.zip
          tag: v${{ env.VERSION }}+${{ github.run_number }}
          token: ${{ secrets.GH_TOKEN }}
          prerelease: ${{ inputs.prerelease }}
          allowUpdates: true
          omitBodyDuringUpdate: true


  # ══════════════════════════════════════════════════════════════════
  # JOB 4 — RELEASE NOTES BOT  (runs after all builds succeed)
  # ══════════════════════════════════════════════════════════════════
  release-notes-bot:
    name: "📝 Release Notes Bot"
    runs-on: ubuntu-latest
    needs: [build-windows-android, build-linux, build-macos]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from pubspec.yaml
        run: |
          VERSION=$(grep -E '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Generate release notes
        env:
          GH_SHA:        ${{ github.sha }}
          GH_RUN_ID:     ${{ github.run_id }}
          GH_SERVER_URL: ${{ github.server_url }}
          GH_REPOSITORY: ${{ github.repository }}
          CUSTOM_NOTES:  ${{ inputs.release_notes }}
        run: |
          python3 - << 'PYEOF'
          import os, subprocess, textwrap
          from datetime import datetime, timezone

          version    = os.environ["VERSION"]
          build      = "${{ github.run_number }}"
          tag        = f"v{version}+{build}"
          sha        = os.environ["GH_SHA"]
          run_id     = os.environ["GH_RUN_ID"]
          server     = os.environ["GH_SERVER_URL"]
          repo       = os.environ["GH_REPOSITORY"]
          custom     = os.environ.get("CUSTOM_NOTES", "").strip()
          date_str   = datetime.now(timezone.utc).strftime("%B %d, %Y")
          run_url    = f"{server}/{repo}/actions/runs/{run_id}"

          # --- changelog from git log ---
          prev = subprocess.run(
              ["git", "tag", "--sort=-version:refname"],
              capture_output=True, text=True
          ).stdout.strip().splitlines()
          prev_tags = [t for t in prev if t != tag]
          if prev_tags:
              log_range = f"{prev_tags[0]}..HEAD"
          else:
              log_range = "HEAD~15..HEAD"

          commits = subprocess.run(
              ["git", "log", "--pretty=format:- %s", log_range, "--no-merges"],
              capture_output=True, text=True
          ).stdout.strip()

          if not commits:
              commits = "- General improvements and bug fixes"

          changelog_section = custom if custom else commits

          notes = f"""\
          ## 🎵 NasBeat {version} — Build #{build}

          > Released **{date_str}** &nbsp;·&nbsp; Multi-source open music player &nbsp;·&nbsp; by [NasTech](https://github.com/nastech-ai)

          ---

          ### 📋 What's New

          {changelog_section}

          ---

          ### 📦 Downloads

          | Platform | Architecture | File | Notes |
          |----------|-------------|------|-------|
          | 🤖 Android | Universal *(all CPUs)* | `nasbeat_android_v{version}+{build}_universal.apk` | ✅ Recommended |
          | 🤖 Android | ARM 64-bit | `nasbeat_android_v{version}+{build}_arm64-v8a.apk` | Modern phones (2017+) |
          | 🤖 Android | ARM 32-bit | `nasbeat_android_v{version}+{build}_armeabi-v7a.apk` | Older devices |
          | 🤖 Android | x86 64-bit | `nasbeat_android_v{version}+{build}_x86_64.apk` | Emulators / Chromebooks |
          | 🪟 Windows | x64 | `nasbeat_windows_x64_v{version}+{build}.zip` | Windows 10 / 11 |
          | 🐧 Linux | x64 | `nasbeat_linux_x64_v{version}+{build}.tar.gz` | Ubuntu 20.04+, Debian, Fedora |
          | 🍎 macOS | Universal | `nasbeat_macos_universal_v{version}+{build}.zip` | macOS 10.14 Mojave+ |

          > **Not sure which Android APK to pick?** Download the **Universal** one — it works on every device.

          ---

          ### 🚀 Installation

          <details>
          <summary><b>🤖 Android</b></summary>

          1. Download the APK for your device *(Universal is safest)*.
          2. Go to **Settings → Security → Install unknown apps** and enable it for your file manager.
          3. Tap the downloaded APK and follow the prompts.

          </details>

          <details>
          <summary><b>🪟 Windows</b></summary>

          1. Download and **extract** `nasbeat_windows_x64_v{version}+{build}.zip`.
          2. Run **`NasBeat.exe`** from the extracted folder.
          3. No installer needed — fully portable.

          </details>

          <details>
          <summary><b>🐧 Linux</b></summary>

          ```bash
          tar -xzf nasbeat_linux_x64_v{version}+{build}.tar.gz
          ./nasbeat
          ```

          Requires: `libgtk-3`, `libglib2.0`, and a compatible audio backend.

          </details>

          <details>
          <summary><b>🍎 macOS</b></summary>

          1. Download and unzip `nasbeat_macos_universal_v{version}+{build}.zip`.
          2. Drag **NasBeat.app** into your **Applications** folder.
          3. **First launch:** right-click → **Open** to bypass Gatekeeper *(unsigned build)*.

          > Requires macOS 10.14 Mojave or later.

          </details>

          ---

          ### 🔧 Build Info

          | Field | Value |
          |-------|-------|
          | Version | `{version}` |
          | Build | `#{build}` |
          | Flutter | `3.35.4 stable` |
          | Commit | [`{sha[:7]}`]({server}/{repo}/commit/{sha}) |
          | CI Run | [#{build}]({run_url}) |

          ---

          *Built with ❤️ by [NasTech](https://github.com/nastech-ai)*
          """

          # dedent (strip leading spaces from the heredoc indentation)
          notes = textwrap.dedent(notes)

          with open("/tmp/release_notes.md", "w") as f:
              f.write(notes)

          print("Release notes written:")
          print("-" * 60)
          print(notes[:500])
          print("...")
          PYEOF

      - name: Publish final release with full notes
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ env.VERSION }}+${{ github.run_number }}
          token: ${{ secrets.GH_TOKEN }}
          prerelease: ${{ inputs.prerelease }}
          allowUpdates: true
          omitArtifactsDuringUpdate: true
          bodyFile: /tmp/release_notes.md
