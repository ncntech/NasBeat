name: "🌳 NasTech Master Bot"
on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
permissions:
  issues: write
  actions: read
  contents: read
jobs:
  weekly-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Weekly NasBeat Dashboard
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRunsForRepo({owner:context.repo.owner,repo:context.repo.repo,per_page:30});
            const week = new Date(Date.now()-7*24*60*60*1000).toISOString();
            const recent = runs.data.workflow_runs.filter(r=>r.created_at>week&&r.status==="completed");
            const passed = recent.filter(r=>r.conclusion==="success").length;
            const failed = recent.filter(r=>r.conclusion==="failure").length;
            const rate = recent.length>0?Math.round(passed/recent.length*100):100;
            const status = rate>=90?"🟢 Excellent":rate>=70?"🟡 Needs Attention":"🔴 Action Required";
            const botIssues = await github.rest.issues.listForRepo({owner:context.repo.owner,repo:context.repo.repo,labels:"nastech-bot",state:"open",per_page:20});
            const issueList = botIssues.data.map(i=>`- [${i.title}](${i.html_url})`).join("\n")||"- None 🎉";
            const title = `🌳 [NasTech Bot] Weekly Report — ${new Date().toISOString().slice(0,10)}`;
            const body = `# NasBeat Weekly Health Dashboard\n\n**Build Health:** ${status} (${rate}% — ${passed} passed, ${failed} failed)\n\n## Open Bot Issues\n${issueList}\n\n## Links\n- [Actions](https://github.com/${context.repo.owner}/${context.repo.repo}/actions)\n- [Releases](https://github.com/${context.repo.owner}/${context.repo.repo}/releases)\n\n---\n*NasTech Master Bot*`;
            await github.rest.issues.create({owner:context.repo.owner,repo:context.repo.repo,title,body,labels:["nastech-bot","weekly-report"]});
