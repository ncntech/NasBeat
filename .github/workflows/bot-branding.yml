name: "🌳 NasTech Branding Bot"

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"   # Every Monday 06:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  branding-check:
    name: Scan for stale upstream branding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan UI files for foreign branding
        id: scan
        run: |
          FINDINGS=""

          # Files that SHOULD NOT contain upstream names in user-visible strings
          UI_FILES=$(find lib/screens lib/l10n -name "*.dart" -o -name "*.arb" 2>/dev/null | tr "\n" " ")

          for term in "BloomeeTunes" "iamhemantindia" "HemantKArya" "hemantkarya.github.io" "sourceforge.net/projects/bloomee"; do
            HITS=$(grep -rn "$term" $UI_FILES 2>/dev/null | grep -v "^Binary" || true)
            if [ -n "$HITS" ]; then
              FINDINGS="${FINDINGS}\n### \`$term\`\n\`\`\`\n${HITS}\n\`\`\`\n"
            fi
          done

          if [ -n "$FINDINGS" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            # Write to file to avoid env size limits
            printf "$FINDINGS" > /tmp/branding_findings.txt
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Create/update issue if stale branding found
        if: steps.scan.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const findings = fs.readFileSync("/tmp/branding_findings.txt", "utf8");
            const title = "🌳 [NasTech Bot] Stale foreign branding detected";
            const body = `## Branding Scan Report\n\n` +
              `**Run:** ${context.runId} | **Branch:** ${context.ref}\n\n` +
              `The following foreign branding references were found in UI/l10n files:\n\n` +
              findings + `\n\n---\n*Generated by NasTech Branding Bot — fix and push to resolve.*`;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: "nastech-bot,branding", state: "open"
            });

            if (issues.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issues.data[0].number, body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ["nastech-bot", "branding"]
              });
            }

      - name: Close existing branding issue if all clear
        if: steps.scan.outputs.found == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: "nastech-bot,branding", state: "open"
            });
            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number,
                body: "✅ All branding checks passed — closing automatically."
              });
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, state: "closed"
              });
            }
            console.log("✅ No stale branding found.");
