name: Flutter CI

on:
  push:
    branches: [ main, SmartBot ]
  pull_request:
    branches: [ main ]

jobs:
  format-check:
    name: Dart format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
      - name: Check format
        run: |
          flutter format --set-exit-if-changed .

  analyze:
    name: Dart analyze
    runs-on: ubuntu-latest
    needs: format-check
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
      - name: Pub get
        run: flutter pub get
      - name: Analyze
        run: flutter analyze --no-fatal-infos

  test-linux:
    name: Flutter test (linux)
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
      - name: Run tests
        run: |
          flutter pub get
          flutter test --coverage

  test-macos:
    name: Flutter test (macos)
    runs-on: macos-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
      - name: Run tests
        run: |
          flutter pub get
          flutter test --coverage

  build-android:
    name: Android build (assemble)
    runs-on: ubuntu-latest
    needs: test-linux
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --debug

  build-ios:
    name: iOS build (archive)
    runs-on: macos-latest
    needs: test-macos
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
      - name: Build iOS (skip signing)
        run: |
          flutter pub get
          flutter build ios --no-codesign
